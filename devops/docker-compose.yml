version: "3.3"

services:
  mongo:
    image: mongo:7.0
    container_name: apontamento-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo-data:/data/db
    networks:
      - apontamento-net

  backend:
    build:
      context: ../backend
      dockerfile: src/Apontamento.Api/Dockerfile
    image: apontamento-api:latest
    container_name: apontamento-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDb__ConnectionString: mongodb://admin:password123@mongo:27017/apontamento_horas?authSource=admin
      MongoDb__DatabaseName: apontamento_horas
      MongoDb__ProjetosCollectionName: projetos
      MongoDb__ApontamentosCollectionName: apontamentos
    ports:
      - "8080:8080"
    networks:
      - apontamento-net

  frontend:
    build:
      context: ../frontend/src
      dockerfile: Dockerfile
    image: apontamento-frontend:latest
    container_name: apontamento-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://192.168.0.67:8080"
    ports:
      - "3000:3000"
    networks:
      - apontamento-net

volumes:
  mongo-data:

networks:
  apontamento-net:
    driver: bridge
